<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Cinevora - Nonton Film Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          var url = e.target.src || e.target.href;
          if (url && url.indexOf('/assets/') > -1) {
            console.warn('Critical asset failed to load:', url);
            var lastReload = sessionStorage.getItem('asset_fail_reload');
            var now = Date.now();
            if (!lastReload || (now - Number(lastReload) > 15000)) {
              sessionStorage.setItem('asset_fail_reload', String(now));
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                  regs.forEach(function(reg) { reg.unregister(); });
                  if ('caches' in window) {
                    caches.keys().then(function(keys) {
                      var promises = keys.map(function(key) { return caches.delete(key); });
                      Promise.all(promises).then(function() {
                        window.location.reload();
                      });
                    }).catch(function() {
                      window.location.reload();
                    });
                  } else {
                    window.location.reload();
                  }
                }).catch(function() {
                  window.location.reload();
                });
              } else {
                window.location.reload();
              }
            } else {
              console.error('Asset load failed repeatedly. Stopping reload loop.');
            }
          }
        }
      }, true);
    </script>
  </head>
  <body class="bg-cinema-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
